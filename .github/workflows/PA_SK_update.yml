name: PA_SK_update

permissions:
  contents: write

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Allow manual triggers
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
      - 'SK_PA_latest.py'
     
jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository   
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pytz supabase geopandas
      
      - name: Run PurpleAir data collection
        run: python  web/SK_PA_latest.py
        env:
          PURPLEAIR_API_KEY: ${{ secrets.PURPLEAIR_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      
      - name: Commit and push if data changed
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
      
          git add dataSK/SK_PM25_map.json
          git commit -m "Update SK PurpleAir data" || echo "No changes to commit"
          git pull --rebase origin main
          git push    
