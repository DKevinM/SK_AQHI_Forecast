name: Train AQHI Models

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  train:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # PYTHON SETUP
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install pandas numpy scikit-learn joblib

      # -------------------------
      # R SETUP
      # -------------------------
      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages("Cubist", repos="https://cloud.r-project.org")'

      # -------------------------
      # CREATE MODELS DIRECTORY
      # -------------------------
      - name: Create models directory
        run: |
          mkdir -p models

      # -------------------------
      # TRAIN RF
      # -------------------------
      - name: Train Random Forest models
        run: |
          python scripts/train_rf_model.py

      # -------------------------
      # TRAIN CUBIST
      # -------------------------
      - name: Train Cubist models
        run: |
          Rscript scripts/train_cubist_model.R

      # -------------------------
      # SHOW OUTPUTS
      # -------------------------
      - name: Show model outputs
        run: |
          ls -lh models/

      # -------------------------
      # COMMIT MODELS
      # -------------------------
      - name: Commit trained models
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --rebase

          git add models/

          git diff --staged --quiet || git commit -m "Update AQHI forecast models"

          git push
