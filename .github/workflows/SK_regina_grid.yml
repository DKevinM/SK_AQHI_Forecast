name: Regina AQHI Grid

on:
  schedule:
    - cron: '15 * * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-grid:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packages
        run: |
          pip install pandas numpy geopandas shapely requests

      - name: Generate Regina AQHI grid
        run: |
          python web/SK_regina_idw.py

      - name: Commit grid
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

          git add data/regina_current_blend.geojson

          git commit -m "Update Regina AQHI grid" || echo "No changes"

          git push
